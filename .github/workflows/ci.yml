name: Workflow CI - MLflow Project + Docker

on:
  push:
    branches: [main]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install MLflow & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn \
                      matplotlib seaborn dagshub

      - name: Configure DagsHub & MLflow Tracking
        env:
          DAGSHUB_USERNAME:         ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO_NAME:        ${{ secrets.DAGSHUB_REPO_NAME }}
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          mlflow run . --env-manager=local \
          -P n_estimators=200 \
          -P max_depth=10 \
          -P min_samples_split=5 \
          -P min_samples_leaf=2

      - name: Run MLflow Project
        env:
          DAGSHUB_USERNAME:         ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO_NAME:        ${{ secrets.DAGSHUB_REPO_NAME }}
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          mlflow run . \
            --env-manager=local \
            -P n_estimators=200 \
            -P max_depth=10 \
            -P min_samples_split=5 \
            -P min_samples_leaf=2

      - name: Save Artifacts      
        run: |
          mkdir -p artifacts
          if ls MLProject/mlruns/*/artifacts/plots/*.png 1>/dev/null 2>&1; then
            cp MLProject/mlruns/*/artifacts/plots/*.png artifacts/
            echo "Artifacts ditemukan dan disalin"
          else
            echo "Tidak ada artifacts plots, cek path mlruns"
            find . -name "*.png" 2>/dev/null | head -20
          fi
          ls -lh artifacts/ || echo "Folder artifacts kosong"

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: artifacts/
          retention-days: 30

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image with MLflow
        env:
          DOCKERHUB_USERNAME:       ${{ secrets.DOCKERHUB_USERNAME }}
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow models build-docker \
            --model-uri "models:/StudentPerformanceClassifier_CI/latest" \
            --name "$DOCKERHUB_USERNAME/student-performance-model" \
            --env-manager=local
        continue-on-error: true

      - name: Push Docker Image to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker push "$DOCKERHUB_USERNAME/student-performance-model:latest" || \
          echo "Docker push skipped (image build may have failed)"
        continue-on-error: true

      - name: Commit Artifacts Back to Repo   # ✅ Fix cek kosong
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/ || true
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan untuk di-commit"
          else
            git commit -m "ci: upload training artifacts [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}